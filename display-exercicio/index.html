<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Exercicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Carros e Bicicleta</h1>
    <div class="carro">
        <h3>Carro: <span>R$ 1999</span></h3>
        <p>Carro modelo <span>2045</span>, com <span>200km</span> rodados.</p>
        <button class="btn">Compra Carro</button>
    </div>

    <div class="bicleta">
        <h3>Bicicleta: <span>R$ 199</span></h3>
        <p>Bicicleta modelo <span>2050</span>, com <span>20km</span> rodados.</p>
        <button class="btn">Comprar Bicleta</button>
    </div>
</body>
</html>
